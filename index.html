<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CVI 多色移動條紋</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* 禁用所有預設的觸控行為 (如雙指放大、文字選取、右鍵選單) */
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 觸控感應層，覆蓋全螢幕 */
        #touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* 左上角視覺提示 (可選，目前設為透明，僅供開發者參考位置) */
        #secret-hint {
            position: absolute;
            top: 0;
            left: 0;
            width: 120px;
            height: 120px;
            z-index: 6;
            pointer-events: none;
            /* background: rgba(255,255,255,0.05); 打開這行可以看到觸控區 */
        }

        /* 控制面板 */
        #ui-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            color: white;
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 20;
            width: 400px;
            display: none; /* 預設完全隱藏 */
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 18px;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 30px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #666;
            border-radius: 8px;
        }

        button {
            font-weight: bold;
            background: #007AFF;
            border: none;
            margin-top: 10px;
        }

        .value-display {
            float: right;
            font-weight: normal;
            color: #aaa;
        }

        .color-preview {
            display: flex;
            height: 15px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
        }

        .color-block {
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="touch-layer"></div>
    <div id="secret-hint"></div>

    <div id="ui-panel">
        <h2 style="margin-top: 0; text-align: center;">⚙️ 設定面板</h2>
        
        <div class="control-group">
            <label>互動模式</label>
            <select id="input-interaction">
                <option value="continuous">持續播放 (無須觸控)</option>
                <option value="immediate">按下播放，離開螢幕立即停止</option>
                <option value="delay3s">按下播放，離開螢幕 3 秒後停止</option>
            </select>
        </div>

        <div class="control-group">
            <label>顏色數量: <span id="val-colors" class="value-display">3</span></label>
            <input type="range" id="input-colors" min="3" max="11" value="3">
            <div id="color-preview-bar" class="color-preview"></div>
        </div>

        <div class="control-group">
            <label>條紋寬度 (px): <span id="val-width" class="value-display">150</span></label>
            <input type="range" id="input-width" min="50" max="400" step="10" value="150">
        </div>

        <div class="control-group">
            <label>移動速度: <span id="val-speed" class="value-display">2.0</span></label>
            <input type="range" id="input-speed" min="0.5" max="10" step="0.5" value="2">
        </div>

        <div class="control-group">
            <label>移動方向</label>
            <select id="input-direction">
                <option value="right">向右移動 (垂直條紋)</option>
                <option value="left">向左移動 (垂直條紋)</option>
                <option value="down">向下移動 (水平條紋)</option>
                <option value="up">向上移動 (水平條紋)</option>
            </select>
        </div>

        <button id="btn-close-ui">完成設定並隱藏</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touch-layer');
        const uiPanel = document.getElementById('ui-panel');
        const previewBar = document.getElementById('color-preview-bar');

        // 依序排列的顏色
        const COLORS = [
            '#FF0000', '#FFFF00', '#0000FF', '#00FF00', '#800080', 
            '#FFA500', '#00FFFF', '#8B4513', '#FFC0CB', '#000000', '#FFFFFF'
        ];

        let config = {
            interactionMode: 'continuous', // continuous, immediate, delay3s
            numColors: 3,
            stripeWidth: 150,
            speed: 2,
            direction: 'right'
        };

        // 系統變數
        let offset = 0;
        let isPlaying = true;
        let playDelayTimer = null;
        let secretMenuTimer = null;
        let logicalWidth, logicalHeight;

        // --- iPad Retina 畫布適配 ---
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            logicalWidth = window.innerWidth;
            logicalHeight = window.innerHeight;
            
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;
            canvas.style.width = logicalWidth + 'px';
            canvas.style.height = logicalHeight + 'px';
            
            ctx.scale(dpr, dpr);
            if (!isPlaying) draw(); // 視窗改變時重繪一次
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- UI 控制與更新 ---
        function updateColorPreview() {
            previewBar.innerHTML = '';
            for(let i=0; i<config.numColors; i++) {
                let div = document.createElement('div');
                div.className = 'color-block';
                div.style.backgroundColor = COLORS[i];
                previewBar.appendChild(div);
            }
        }

        document.getElementById('input-interaction').addEventListener('change', (e) => {
            config.interactionMode = e.target.value;
            // 切換模式時重置播放狀態
            if(config.interactionMode === 'continuous') {
                isPlaying = true;
            } else {
                isPlaying = false; 
                offset = 0; // 重置位置
            }
            if(!isPlaying) draw();
        });

        document.getElementById('input-colors').addEventListener('input', (e) => {
            config.numColors = parseInt(e.target.value);
            document.getElementById('val-colors').textContent = config.numColors;
            updateColorPreview();
            if(!isPlaying) draw();
        });

        document.getElementById('input-width').addEventListener('input', (e) => {
            config.stripeWidth = parseInt(e.target.value);
            document.getElementById('val-width').textContent = config.stripeWidth;
            if(!isPlaying) draw();
        });

        document.getElementById('input-speed').addEventListener('input', (e) => {
            config.speed = parseFloat(e.target.value);
            document.getElementById('val-speed').textContent = config.speed.toFixed(1);
        });

        document.getElementById('input-direction').addEventListener('change', (e) => {
            config.direction = e.target.value;
            if(!isPlaying) draw();
        });

        document.getElementById('btn-close-ui').addEventListener('click', () => {
            uiPanel.style.display = 'none';
        });

        // --- 核心觸控邏輯 (包含長按解鎖與播放控制) ---
        function handleTouchStart(e) {
            e.preventDefault(); // 防止 iPad 預設手勢
            
            // 檢查是否為「長按左上角解鎖」
            const touch = e.touches ? e.touches[0] : e;
            if (touch.clientX < 150 && touch.clientY < 150) {
                if (secretMenuTimer) clearTimeout(secretMenuTimer);
                secretMenuTimer = setTimeout(() => {
                    uiPanel.style.display = 'flex';
                }, 3000); // 3秒長按
            }

            // 遊戲播放控制
            if (config.interactionMode !== 'continuous') {
                if (playDelayTimer) {
                    clearTimeout(playDelayTimer);
                    playDelayTimer = null;
                }
                isPlaying = true;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            // 如果手指滑動離開左上角，取消長按解鎖
            const touch = e.touches ? e.touches[0] : e;
            if (touch.clientX > 150 || touch.clientY > 150) {
                if (secretMenuTimer) clearTimeout(secretMenuTimer);
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            // 手指離開，取消長按解鎖計時
            if (secretMenuTimer) clearTimeout(secretMenuTimer);

            // 遊戲播放控制
            if (config.interactionMode === 'immediate') {
                isPlaying = false;
            } else if (config.interactionMode === 'delay3s') {
                if (playDelayTimer) clearTimeout(playDelayTimer);
                playDelayTimer = setTimeout(() => {
                    isPlaying = false;
                }, 3000); // 離開後 3 秒停止
            }
        }

        // 綁定事件至觸控層
        touchLayer.addEventListener('touchstart', handleTouchStart, {passive: false});
        touchLayer.addEventListener('touchmove', handleTouchMove, {passive: false});
        touchLayer.addEventListener('touchend', handleTouchEnd, {passive: false});
        touchLayer.addEventListener('touchcancel', handleTouchEnd, {passive: false});

        // --- 繪製函數 ---
        function draw() {
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);

            const activeColors = COLORS.slice(0, config.numColors);
            const totalCycleWidth = config.stripeWidth * config.numColors;

            offset = offset % totalCycleWidth;
            if (offset < 0) offset += totalCycleWidth;

            let numStripes;
            
            if (config.direction === 'right' || config.direction === 'left') {
                numStripes = Math.ceil(logicalWidth / config.stripeWidth) + config.numColors;
                
                for (let i = -config.numColors; i < numStripes; i++) {
                    const colorIndex = (i % config.numColors + config.numColors) % config.numColors;
                    ctx.fillStyle = activeColors[colorIndex];
                    
                    let xPos;
                    if (config.direction === 'right') {
                        xPos = (i * config.stripeWidth) + offset - totalCycleWidth;
                    } else {
                        xPos = (i * config.stripeWidth) - offset;
                    }
                    
                    ctx.fillRect(xPos, 0, config.stripeWidth + 1, logicalHeight);
                }
            } else {
                numStripes = Math.ceil(logicalHeight / config.stripeWidth) + config.numColors;
                
                for (let i = -config.numColors; i < numStripes; i++) {
                    const colorIndex = (i % config.numColors + config.numColors) % config.numColors;
                    ctx.fillStyle = activeColors[colorIndex];
                    
                    let yPos;
                    if (config.direction === 'down') {
                        yPos = (i * config.stripeWidth) + offset - totalCycleWidth;
                    } else {
                        yPos = (i * config.stripeWidth) - offset;
                    }
                    
                    ctx.fillRect(0, yPos, logicalWidth, config.stripeWidth + 1);
                }
            }
        }

        // --- 遊戲循環 ---
        function loop() {
            if (isPlaying) {
                offset += config.speed;
                draw();
            }
            requestAnimationFrame(loop);
        }

        // 初始化
        updateColorPreview();
        // 如果預設不是持續播放，則先暫停
        if(config.interactionMode !== 'continuous') isPlaying = false; 
        draw(); 
        loop();

    </script>
</body>
</html>
